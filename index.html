<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Mobile App</title>
    <!-- daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f5f7] h-[100vh] mx-auto flex flex-col justify-center items-center">
    <div class="h-[130px] w-[300px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center">
        <img src="assets/Group.png" alt="">
    </div>
    <form class="w-[300px] bg-white rounded-3xl py-5 px-5 mx-10">
        <div>
            <label for="" class="font-bold">Mobile Number</label><br>
            <input id="user-number" type="text" placeholder="Enter Your Number" class="input rounded-xl bg-[#f4f5f7] mt-5" />
        </div>
            <div class="mt-5">
            <label for="" class="font-bold">4 Digit Pin</label><br>
            <input type="password" id="user-pin" type="text" placeholder="Enter Your Pin" class="input rounded-xl bg-[#f4f5f7] mt-5" >
        </div>
        <button id="login-button" class="btn btn-primary text-center flex mt-5 w-full rounded-3xl">Login</button>
        <div id="form-container">
            <!-- error message -->
        </div>
    </form>
    <script src="script.js"></script>
</body>
</html>
