<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Mobile App</title>
    <!-- daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f5f7] h-[100vh] mx-auto flex justify-center items-center">
    <form class="w-[350px] bg-white rounded-3xl m-10 p-5">
        <div>
            <label for="" class="font-bold">Mobile Number</label><br>
            <input type="text" placeholder="Enter Your Number" class="input rounded-xl bg-[#f4f5f7] mt-5" />
        </div>
            <div class="mt-5">
            <label for="" class="font-bold">4 Digit Pin</label><br>
            <input type="text" placeholder="Enter Your Pin" class="input rounded-xl bg-[#f4f5f7] mt-5" />
        </div>
        <button class="btn btn-primary text-center flex mt-5 w-full rounded-3xl">Login</button>
    </form>
</body>
</html>
