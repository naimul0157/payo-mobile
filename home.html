<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome link -->
     <script src="https://kit.fontawesome.com/ea3ef3fca6.js" crossorigin="anonymous"></script>
    <title>Home page</title>
</head>
<body class="bg-[#f4f5f7] h-full">
  <section class="bg-white pb-10 max-w-lg mx-auto rounded-b-xl">  
    <div class="h-[80px] flex justify-between items-center px-5 max-w-lg mx-auto pt-10 mb-10">
        <div class="flex items-center">
            <img src="assets/Group.png" alt="" class="mr-5 w-[5vw]">
            <div>
                <h2 class="font-bold">$<span id="initial-amount">45000</span></h2>
                <p class="mt-2">Avialable Balance</p>
            </div>
        </div>
        <div>
            <button id="logout-hompage" class="btn"><i class="fa-solid fa-arrow-right-from-bracket rotate-180 bg-[#f4f5f6]"></i>Log Out</button>
        </div>
    </div>
    <div class="max-w-lg mx-auto px-5">
        <h1 class="font-bold">
           🔥 Welcome to Payooo!
        </h1>
        <p>
            Enjoy easy and convenient financial services with us. Cashout charge is low and 
        </p>
    </div>
    <div class="max-w-lg mx-auto grid grid-cols-3 grid-rows-2 gap-3 mt-5 pt-5 pb-10 px-5">
        <div class="border-2 border-gray-200 flex flex-col items-center py-4 rounded-xl">
            <img src="assets/wallet1.png" alt="">
            <h2 class="text-center">Add Money</h2>
            </div>
        <div class="border-2 border-gray-200 flex flex-col items-center py-4 rounded-xl">
            <img src="assets/send1.png" alt="">
            <h2 class="text-center">Cashout</h2>
            </div>
        <div class="border-2 border-gray-200 flex flex-col items-center py-4 rounded-xl">
            <img src="assets/money1.png" alt="">
            <h2 class="text-center">Transfer Money</h2>
            </div>
        <div class="border-2 border-gray-200 flex flex-col items-center py-4 rounded-xl">
            <img src="assets/bonus1.png" alt="">
            <h2 class="text-center">Get Bonus</h2>
            </div>
        <div class="border-2 border-gray-200 flex flex-col items-center py-4 rounded-xl">
            <img src="assets/purse1.png" alt="">
            <h2 class="text-center">Pay Bill</h2>
            </div>
        <div class="border-2 border-gray-200 flex flex-col items-center py-4 rounded-xl">
            <img src="assets/transaction1.png" alt="">
            <h2 class="text-center">Transactions</h2>
            </div>
    </div>
    </section>
    <section class="max-w-lg mx-auto my-10">
        <h1 class="mb-5 font-bold px-5">
            Add Money
        </h1>
        <div id="Add-money-container" class="px-3 bg-white py-10 rounded-2xl mx-4">
            <div>
                <h1 class="font-bold">
                    Select A bank
                </h1>
                <!-- select -->
                 <fieldset class="fieldset">
 
                <select id="bank" class="select rounded-2xl bg-[#f4f5f7] w-full mb-5">
                    <option disabled selected>Pick a Bank Name</option>
                    <option>Ab Bank</option>
                    <option>Al Arafah Bank</option>
                    <option>Duth Bangla Bank</option>
                </select>
                </fieldset>
            </div>
            <div>
                <h1 class="font-bold">
                    Bank Account Number
                </h1>
                <input id="account-number" type="text" placeholder="Enter 11 digit account number" class="input rounded-2xl bg-[#f4f5f7] mt-5 w-full mb-5" >
            </div>
            <div>
                  <h1 class="font-bold">
                    Amount to add
                </h1>
                <input id="amount-to-add" type="text" placeholder="Add amount to withdraw" class="input rounded-2xl bg-[#f4f5f7] mt-5 w-full mb-5" >
            </div>
            <div>
                  <h1 class="font-bold">
                    Pin Number
                </h1>
                <input id="pin" type="password" type="text" placeholder="Enter 4 digit pin number" class="input rounded-2xl bg-[#f4f5f7] mt-5 w-full" >
            </div>
            <button id="add-money" class="btn btn-primary text-center flex mt-5 w-full rounded-3xl">Add Money</button>
        </div>
    </section>       
    <script src="home.js">  
    </script>
</body>
</html>
